apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: AI Diagnostic Assistant CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Mock Secrets Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] Secrets scan complete — 0 findings"
      - name: Mock SAST Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] SAST scan complete — 1 finding (HIGH: unregistered LLM usage)"
      - name: Mock SCA Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] SCA scan complete — 4 vulnerable dependencies"
      - name: Publish Security Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Security Scan Results — AI Diagnostic Assistant
            | Scanner | Findings | Severity |
            |---------|----------|----------|
            | Secrets | 0 | — |
            | SAST | 1 | HIGH |
            | SCA | 4 | HIGH |

            **AI Governance**: OPEN — unregistered LLM usage detected in src/diagnostic_engine.py:34 (CCI-AI-001)
            **Risk**: Claude API called without ai-governance.yaml manifest — unreviewed clinical AI
            **SLA Status**: OVERDUE — critical AI governance policy breach
          format: MARKDOWN

  build:
    needs:
      - scan
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Build
        uses: docker://alpine:3.19
        run: |
          echo "Building ai-diagnostic-assistant v0.9.${{ cloudbees.run_number }}"
      - name: Register build artifact
        id: register-artifact
        uses: cloudbees-io/register-build-artifact@v2
        with:
          name: ai-diagnostic-assistant
          version: 0.9.${{ cloudbees.run_number }}
          url: https://github.com/shozab-unify-examples/stryker-ai-diagnostic-assistant
      - name: Publish Build Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Build — AI Diagnostic Assistant v0.9.${{ cloudbees.run_number }}
            - **Classification**: CRITICAL | ai | llm | agentic-ai | clinical | regulated
            - **Owner**: Digital Health BU
          format: MARKDOWN

  deploy-dev:
    needs:
      - build
    steps:
      - name: Deploy to Dev
        uses: docker://alpine:3.19
        run: |
          echo "Deployed ai-diagnostic-assistant v0.9.${{ cloudbees.run_number }} to DEV"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: ai-diagnostic-assistant
          version: 0.9.${{ cloudbees.run_number }}
          environment-name: stryker-dev
          url: https://github.com/shozab-unify-examples/stryker-ai-diagnostic-assistant

  deploy-staging:
    needs:
      - build
      - deploy-dev
    steps:
      - name: Deploy to Staging
        uses: docker://alpine:3.19
        run: |
          echo "Deployed ai-diagnostic-assistant v0.9.${{ cloudbees.run_number }} to STAGING"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: ai-diagnostic-assistant
          version: 0.9.${{ cloudbees.run_number }}
          environment-name: stryker-staging
          url: https://github.com/shozab-unify-examples/stryker-ai-diagnostic-assistant

  deploy-prod:
    needs:
      - build
      - deploy-staging
    steps:
      - name: Deploy to Production
        uses: docker://alpine:3.19
        run: |
          echo "Deployed ai-diagnostic-assistant v0.9.${{ cloudbees.run_number }} to PRODUCTION"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: ai-diagnostic-assistant
          version: 0.9.${{ cloudbees.run_number }}
          environment-name: stryker-prod
          url: https://github.com/shozab-unify-examples/stryker-ai-diagnostic-assistant
